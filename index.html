<title>Carnet de mise</title>
<style>
:root{
  --bg:#0E1116; --surface:#161A21; --surface-2:#1D222B; --border:#272E39;
  --text:#E7EAEE; --muted:#8A93A2; --gain:#2FD98A; --loss:#F6516B;
  --accent:#F5B23E; --pending:#7A8496;
  --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg); color:var(--text);
  padding:calc(var(--safe-t) + 14px) 14px calc(var(--safe-b) + 96px);
  max-width:760px; margin:0 auto; min-height:100vh;
}
.num{font-variant-numeric:tabular-nums; font-family:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;}

.topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; gap:10px;}
.brand{display:flex; align-items:center; gap:11px;}
.brand-mark{color:var(--accent); font-size:19px;}
.brand-name{font-weight:600; font-size:16px; letter-spacing:-.2px;}
.brand-sub{color:var(--muted); font-size:11.5px;}
.icon-actions{display:flex; gap:6px;}

.btn{border-radius:9px; padding:9px 14px; font-size:13.5px; font-weight:600; cursor:pointer; border:1px solid transparent; font-family:inherit;}
.btn.primary{background:var(--accent); color:#1A1206;}
.btn.primary:disabled{opacity:.4;}
.btn.ghost{background:transparent; color:var(--text); border:1px solid var(--border);}
.mini{padding:7px 10px; font-size:12px; border-radius:8px; background:var(--surface-2); border:1px solid var(--border); color:var(--text); cursor:pointer; font-family:inherit;}

.periods{display:flex; gap:6px; margin-bottom:14px; overflow-x:auto; -webkit-overflow-scrolling:touch;}
.chip{white-space:nowrap; padding:8px 14px; border-radius:20px; font-size:12.5px; font-weight:600;
  background:var(--surface); border:1px solid var(--border); color:var(--muted); cursor:pointer; font-family:inherit;}
.chip.active{background:var(--accent); color:#1A1206; border-color:var(--accent);}

.hero{background:linear-gradient(180deg,var(--surface),var(--bg)); border:1px solid var(--border); border-radius:16px; padding:22px 20px; margin-bottom:12px;}
.hero-label{color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:1.4px;}
.hero-value{font-size:42px; font-weight:700; letter-spacing:-1.5px; margin:3px 0 7px; font-variant-numeric:tabular-nums; font-family:ui-monospace,"SF Mono",Menlo,monospace;}
.hero-meta{color:var(--muted); font-size:13px; display:flex; gap:7px; flex-wrap:wrap; align-items:center;}
.dot{color:var(--border);}

.cards{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px;}
.stat{background:var(--surface); border:1px solid var(--border); border-radius:13px; padding:14px;}
.stat-label{color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.6px;}
.stat-value{font-size:22px; font-weight:600; margin:5px 0 3px; letter-spacing:-.5px;}
.stat-sub{color:var(--muted); font-size:11px;}

.metrics{display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:8px; margin-bottom:12px;}
.metric{background:var(--surface); border:1px solid var(--border); border-radius:11px; padding:11px 10px; text-align:center;}
.metric-value{font-size:16px; font-weight:700; letter-spacing:-.3px;}
.metric-label{color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:.4px; margin-top:3px;}

.panel{background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:12px;}
.panel-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; gap:8px; flex-wrap:wrap;}
.panel-head h2{font-size:14px; font-weight:600; margin:0;}
.panel-hint{color:var(--muted); font-size:11.5px;}

.chart{width:100%; height:170px; display:block;}
.chart-empty{color:var(--muted); font-size:13px; text-align:center; padding:40px 0;}

.sites{display:flex; flex-direction:column; gap:10px;}
.site-row{display:grid; grid-template-columns:104px 1fr 84px; align-items:center; gap:10px;}
.site-name{font-size:12.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.site-sub{color:var(--muted); font-size:10.5px;}
.site-track{height:7px; background:var(--surface-2); border-radius:4px; overflow:hidden;}
.site-bar{height:100%; border-radius:4px; min-width:3px;}
.site-profit{text-align:right; font-size:12.5px; font-weight:600;}

.accounts{display:flex; flex-direction:column; gap:9px;}
.account{background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:13px 14px;}
.account-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
.account-name{font-size:14px; font-weight:600;}
.account-sub{color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.5px; margin-top:1px;}
.account-solde{font-size:21px; font-weight:700; letter-spacing:-.5px;}
.account-detail{color:var(--muted); font-size:11.5px; margin-top:9px; display:flex; gap:6px; flex-wrap:wrap; align-items:center;}
.account-detail b{color:var(--text); font-weight:600;}

.filters{display:flex; gap:7px; flex-wrap:wrap;}
select{background:var(--surface-2); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:7px 9px; font-size:12.5px; font-family:inherit;}

.bets{display:flex; flex-direction:column; gap:8px;}
.bet{background:var(--surface-2); border:1px solid var(--border); border-radius:11px; padding:12px;}
.bet-line1{display:flex; align-items:center; gap:8px; margin-bottom:4px;}
.bet-event{font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1;}
.badge{font-size:10px; font-weight:600; padding:2px 7px; border:1px solid; border-radius:20px; text-transform:uppercase; letter-spacing:.4px; white-space:nowrap;}
.badge-soft{font-size:10px; font-weight:600; padding:2px 7px; border-radius:20px; background:var(--surface); color:var(--muted); white-space:nowrap;}
.bet-line2{display:flex; align-items:center; gap:6px; color:var(--muted); font-size:11.5px; flex-wrap:wrap; margin-bottom:8px;}
.bet-bottom{display:flex; justify-content:space-between; align-items:center; gap:10px;}
.bet-profit{font-size:15px; font-weight:700;}
.quick{display:flex; gap:5px;}
.q{border-radius:7px; padding:6px 11px; font-size:12px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:transparent; font-family:inherit;}
.q-win{color:var(--gain);} .q-lose{color:var(--loss);} .q-void{color:var(--muted);}
.bet-tools{display:flex; gap:2px;}
.icon-btn{background:transparent; border:none; color:var(--muted); cursor:pointer; font-size:14px; padding:6px 8px; border-radius:6px; font-family:inherit;}

.empty{text-align:center; padding:56px 20px; color:var(--muted);}
.empty-big{font-size:18px; color:var(--text); font-weight:600; margin-bottom:6px;}
.empty p{margin:0 auto 18px; max-width:320px; font-size:13.5px;}
.empty-sm{color:var(--muted); font-size:13px; text-align:center; padding:18px;}

.fab{position:fixed; right:16px; bottom:calc(var(--safe-b) + 18px); z-index:40;
  width:auto; padding:15px 20px; border-radius:16px; background:var(--accent); color:#1A1206;
  border:none; font-size:15px; font-weight:700; font-family:inherit; cursor:pointer;
  box-shadow:0 8px 24px rgba(0,0,0,.45);}

.overlay{position:fixed; inset:0; background:rgba(6,8,11,.72); display:flex; align-items:flex-end; justify-content:center; z-index:50; backdrop-filter:blur(3px);}
.modal{background:var(--surface); border:1px solid var(--border); border-radius:18px 18px 0 0; padding:20px 18px calc(var(--safe-b) + 20px); width:100%; max-width:520px; max-height:92vh; overflow-y:auto;}
.modal-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;}
.modal-head h3{margin:0; font-size:17px;}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:11px;}
.field{display:flex; flex-direction:column; gap:5px; margin-bottom:12px;}
.field-label{font-size:12px; color:var(--muted);}
.field input,.field select{background:var(--surface-2); color:var(--text); border:1px solid var(--border); border-radius:10px; padding:12px 12px; font-size:16px; width:100%; font-family:inherit;}
.field input:focus,.field select:focus{outline:none; border-color:var(--accent);}
.hint-box{background:var(--surface-2); border:1px solid var(--border); border-radius:10px; padding:11px 12px; font-size:12.5px; color:var(--muted); margin-bottom:12px;}
.modal-actions{display:flex; gap:8px; margin-top:4px;}
.modal-actions .btn{flex:1; padding:13px;}

@media(min-width:560px){ .cards{grid-template-columns:repeat(4,1fr);} .overlay{align-items:center;} .modal{border-radius:18px;} }
@media(max-width:400px){ .metrics{grid-template-columns:1fr 1fr;} }
</style>
</head>

<script>
/* ---------------- État & stockage local ---------------- */
const KEY = "carnet_paris_v1";
const MKEY = "carnet_mouvements_v1";
let bets = [];
let movements = [];
try { bets = JSON.parse(localStorage.getItem(KEY)) || []; } catch(e){ bets = []; }
try { movements = JSON.parse(localStorage.getItem(MKEY)) || []; } catch(e){ movements = []; }
function persist(){ try{ localStorage.setItem(KEY, JSON.stringify(bets)); localStorage.setItem(MKEY, JSON.stringify(movements)); }catch(e){} }

const SITES = ["Winamax","Betclic","Unibet","ParionsSport (FDJ)","PMU","Zebet","Vbet","Netbet","Bwin","Genybet"];
const SPORTS = ["Football","Tennis","Basketball","Rugby","Formule 1","MMA","Hockey","Handball","Volley","eSport","Autre"];
const STATUTS = {
  pending:{label:"En attente",color:"var(--pending)"},
  won:{label:"Gagné",color:"var(--gain)"},
  lost:{label:"Perdu",color:"var(--loss)"},
  void:{label:"Remboursé",color:"var(--muted)"},
  cashout:{label:"Cashout",color:"var(--accent)"}
};
const BET_TYPES = { simple:"Simple", combine:"Combiné" };
const MOUV = { depot:{label:"Dépôt",color:"var(--gain)"}, retrait:{label:"Retrait",color:"var(--loss)"}, bonus:{label:"Bonus",color:"var(--accent)"} };
const PERIODS = { all:"Depuis le début", month:"Ce mois-ci", days30:"30 jours", year:"Cette année" };

let period = "all";
let filterSite = "all", filterStatut = "all", filterType = "all";

/* ---------------- Helpers ---------------- */
function profit(b){
  const m = parseFloat(b.mise)||0, c = parseFloat(b.cote)||0;
  if(b.statut==="won") return m*(c-1);
  if(b.statut==="lost") return -m;
  if(b.statut==="cashout") return (parseFloat(b.cashout)||0)-m;
  return 0;
}
const fmt = n => Math.abs(n).toLocaleString("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:2});
const eur = n => (n<0?"−":"") + fmt(n) + " €";
const eurS = n => (n>0?"+":n<0?"−":"") + fmt(n) + " €";
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc = s => (s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const betType = b => b.type==="combine" ? "combine" : "simple";

function inPeriod(dateStr){
  if(period==="all") return true;
  const d=new Date(dateStr); if(isNaN(d)) return true;
  const now=new Date();
  if(period==="month") return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
  if(period==="year") return d.getFullYear()===now.getFullYear();
  if(period==="days30"){ const diff=(now-d)/86400000; return diff<=30 && diff>=-1; }
  return true;
}
const betsPeriod = () => bets.filter(b=>inPeriod(b.date));
const movementsPeriod = () => movements.filter(m=>inPeriod(m.date));

/* ---------------- Stats de performance (sur une liste) ---------------- */
function computeStats(list){
  const settled = list.filter(b=>b.statut!=="pending");
  const pending = list.filter(b=>b.statut==="pending");
  const totalMise = settled.reduce((s,b)=>s+(parseFloat(b.mise)||0),0);
  const net = settled.reduce((s,b)=>s+profit(b),0);
  const decided = settled.filter(b=>["won","lost","cashout"].includes(b.statut));
  const winners = settled.filter(b=>profit(b)>0.0001);
  const engaged = pending.reduce((s,b)=>s+(parseFloat(b.mise)||0),0);
  const potential = pending.reduce((s,b)=>s+(parseFloat(b.mise)||0)*((parseFloat(b.cote)||0)-1),0);
  return {net,totalMise,roi:totalMise>0?net/totalMise*100:0,
    winRate:decided.length?winners.length/decided.length*100:0,
    nbSettled:settled.length,nbWinners:winners.length,nbDecided:decided.length,
    nbPending:pending.length,engaged,potential};
}

/* ---------------- Trésorerie (toujours globale, état courant) ---------------- */
function computeTreso(){
  const totalDepots = movements.filter(m=>m.type==="depot").reduce((s,m)=>s+(parseFloat(m.montant)||0),0);
  const totalRetraits = movements.filter(m=>m.type==="retrait").reduce((s,m)=>s+(parseFloat(m.montant)||0),0);
  const totalBonus = movements.filter(m=>m.type==="bonus").reduce((s,m)=>s+(parseFloat(m.montant)||0),0);
  const settled = bets.filter(b=>b.statut!=="pending");
  const net = settled.reduce((s,b)=>s+profit(b),0);
  const engaged = bets.filter(b=>b.statut==="pending").reduce((s,b)=>s+(parseFloat(b.mise)||0),0);
  const soldeTotal = totalDepots + totalBonus - totalRetraits + net - engaged;
  return {totalDepots,totalRetraits,totalBonus,soldeTotal};
}

/* ---------------- Métriques avancées (sur une liste) ---------------- */
function advanced(list){
  const settled = list.filter(b=>b.statut!=="pending");
  const coteAvg = settled.length ? settled.reduce((s,b)=>s+(parseFloat(b.cote)||0),0)/settled.length : 0;
  const miseAvg = settled.length ? settled.reduce((s,b)=>s+(parseFloat(b.mise)||0),0)/settled.length : 0;
  const wonBets = list.filter(b=>b.statut==="won");
  const biggestOdds = wonBets.length ? Math.max(...wonBets.map(b=>parseFloat(b.cote)||0)) : 0;
  // série en cours
  const decided = settled.filter(b=>["won","lost","cashout"].includes(b.statut))
    .sort((a,b)=>new Date(b.date)-new Date(a.date)||b.id.localeCompare(a.id));
  let streakN=0, streakType=null;
  if(decided.length){
    streakType = profit(decided[0])>0 ? "win":"lose";
    for(const b of decided){ const s=profit(b)>0?"win":"lose"; if(s===streakType) streakN++; else break; }
  }
  return {coteAvg,miseAvg,biggestOdds,streakN,streakType};
}

/* ---------------- Répartitions ---------------- */
function bySiteTreso(){
  const m={};
  const get=k=>{ if(!m[k]) m[k]={site:k,profit:0,pending:0,depots:0,retraits:0,bonus:0}; return m[k]; };
  bets.forEach(b=>{ const o=get(b.site||"—"); if(b.statut==="pending") o.pending+=parseFloat(b.mise)||0; else o.profit+=profit(b); });
  movements.forEach(mv=>{ const o=get(mv.site||"—");
    if(mv.type==="depot") o.depots+=parseFloat(mv.montant)||0;
    else if(mv.type==="retrait") o.retraits+=parseFloat(mv.montant)||0;
    else if(mv.type==="bonus") o.bonus+=parseFloat(mv.montant)||0; });
  Object.values(m).forEach(o=>{ o.solde=o.depots+o.bonus-o.retraits+o.profit-o.pending; });
  return Object.values(m).sort((a,b)=>b.solde-a.solde);
}
function groupProfit(list, keyFn){
  const m={};
  list.filter(b=>b.statut!=="pending").forEach(b=>{
    const k=keyFn(b)||"—";
    if(!m[k]) m[k]={key:k,profit:0,count:0};
    m[k].profit+=profit(b); m[k].count++;
  });
  return Object.values(m).sort((a,b)=>b.profit-a.profit);
}

/* ---------------- Graphe SVG (sur une liste) ---------------- */
function cumulative(list){
  const s=list.filter(b=>b.statut!=="pending").sort((a,b)=>new Date(a.date)-new Date(b.date)||a.id.localeCompare(b.id));
  let c=0; return s.map(b=>{c+=profit(b); return c;});
}
function chartSVG(list){
  const pts=[0,...cumulative(list)];
  if(pts.length<2) return '<div class="chart-empty">Le graphe apparaîtra dès ton premier pari réglé sur la période.</div>';
  const W=320,H=150,pad=8;
  const min=Math.min(...pts,0), max=Math.max(...pts,0);
  const range=(max-min)||1;
  const x=i=>pad+i/(pts.length-1)*(W-2*pad);
  const y=v=>H-pad-(v-min)/range*(H-2*pad);
  const line=pts.map((v,i)=>`${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
  const zeroY=y(0).toFixed(1);
  const area=`${x(0).toFixed(1)},${zeroY} ${line} ${x(pts.length-1).toFixed(1)},${zeroY}`;
  const last=pts[pts.length-1];
  const col=last>=0?"var(--gain)":"var(--loss)";
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="ga" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${col}" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
    <line x1="${pad}" y1="${zeroY}" x2="${W-pad}" y2="${zeroY}" stroke="var(--border)" stroke-width="1"/>
    <polygon points="${area}" fill="url(#ga)"/>
    <polyline points="${line}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

  if(t.dataset.act==="add") openModal(null);
  if(t.dataset.act==="addmvt") openMouv(null);
  if(t.dataset.act==="export") exportJSON();
  if(t.dataset.act==="csv") exportCSV();
  if(t.dataset.act==="import") document.getElementById("importFile").click();
  if(t.dataset.set){ const b=bets.find(x=>x.id===t.dataset.id); if(b){b.statut=t.dataset.set; persist(); render();} }
  if(t.dataset.edit){ const b=bets.find(x=>x.id===t.dataset.edit); if(b) openModal(b); }
  if(t.dataset.del){ if(confirm("Supprimer ce pari ?")){ bets=bets.filter(x=>x.id!==t.dataset.del); persist(); render(); } }
  if(t.dataset.medit){ const mv=movements.find(x=>x.id===t.dataset.medit); if(mv) openMouv(mv); }
  if(t.dataset.mdel){ if(confirm("Supprimer ce mouvement ?")){ movements=movements.filter(x=>x.id!==t.dataset.mdel); persist(); render(); } }
});
document.getElementById("app").addEventListener("change",e=>{
  const f=e.target.dataset.filter;
  if(f==="site") filterSite=e.target.value;
  if(f==="statut") filterStatut=e.target.value;
  if(f==="type") filterType=e.target.value;
  render();
});

/* ---------------- Export / import ---------------- */
function exportJSON(){
  const payload={version:3, exportedAt:new Date().toISOString(), bets, movements};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=`carnet-paris-${new Date().toISOString().slice(0,10)}.json`; a.click();
  URL.revokeObjectURL(url);
}
function exportCSV(){
  const q=v=>`"${String(v==null?"":v).replace(/"/g,'""')}"`;
  const head=["Date","Bookmaker","Sport","Type","Evenement","Mise","Cote","Statut","Profit"];
  const rows=bets.slice().sort((a,b)=>new Date(a.date)-new Date(b.date)).map(b=>[
    b.date,b.site,b.sport||"",BET_TYPES[betType(b)],b.event||"",
    (parseFloat(b.mise)||0).toFixed(2),(parseFloat(b.cote)||0).toFixed(2),
    (STATUTS[b.statut]||{}).label||b.statut, profit(b).toFixed(2)
  ]);
  const csv=[head, ...rows].map(r=>r.map(q).join(";")).join("\r\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=`carnet-paris-${new Date().toISOString().slice(0,10)}.csv`; a.click();
  URL.revokeObjectURL(url);
}
document.getElementById("importFile").addEventListener("change",e=>{
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const data=JSON.parse(r.result);
      let newBets, newMvts;
      if(Array.isArray(data)){ newBets=data; newMvts=[]; }
      else if(data && Array.isArray(data.bets)){ newBets=data.bets; newMvts=Array.isArray(data.movements)?data.movements:[]; }
      else { alert("Fichier invalide."); return; }
      if(confirm(`Importer ${newBets.length} pari(s) et ${newMvts.length} mouvement(s) ? Cela remplace les données actuelles.`)){
        bets=newBets; movements=newMvts; persist(); render();
      }
    }catch(err){ alert("Impossible de lire ce fichier."); }
    e.target.value="";
  };
  r.readAsText(file);
});

/* ---------------- Service worker (hors-ligne) ---------------- */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));
}

render();
</script>
